        function Toast({ message, type, onClose }) {
            useEffect(() => { const timer = setTimeout(onClose, 3500); return () => clearTimeout(timer); }, [onClose]);
            const bgClass = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-brand-blue';
            return (
                <div className="fixed bottom-6 right-6 z-[80] animate-[slideUp_0.3s_ease-out]">
                    <div className={bgClass + " text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3 font-bold"}>
                        {type === 'success' ? <Check size={18}/> : type === 'error' ? <ShieldAlert size={18}/> : <CheckCircle size={18}/>}
                        {message}
                    </div>
                </div>
            );
        }

        function RichTextEditor({ value, onChange }) {
            const editorRef = useRef(null);
            
            useEffect(() => {
                if (editorRef.current && !editorRef.current.innerHTML && value) {
                    editorRef.current.innerHTML = value;
                }
            }, []);

            const handleInput = () => {
                onChange(editorRef.current.innerHTML);
            };

            const execCmd = (cmd, arg = null) => {
                document.execCommand(cmd, false, arg);
                editorRef.current.focus();
                handleInput();
            };

            const insertVar = (variable) => {
                const text = `{{${variable}}}`;
                if (document.queryCommandSupported('insertText')) {
                    document.execCommand('insertText', false, text);
                } else {
                    const selection = window.getSelection();
                    if (!selection.rangeCount) return;
                    const range = selection.getRangeAt(0);
                    range.deleteContents();
                    range.insertNode(document.createTextNode(text));
                }
                handleInput();
            };

            return (
                <div className="border border-slate-200 bg-white rounded-xl overflow-hidden flex flex-col flex-1 min-h-[250px] shadow-sm">
                    <div className="bg-slate-50 border-b border-slate-200 p-2 flex gap-2 flex-wrap items-center">

                        <button type="button" onClick={() => execCmd('underline')} className="p-2 hover:bg-slate-200 rounded-lg text-slate-700 transition-colors" title="Underline"><Underline size={16}/></button>

                                                            <td className="p-6"><p className="font-bold text-slate-800 text-sm">{order.userName || order.customerName}</p><p className="text-xs text-slate-500 mt-0.5">{order.contact || order.customerPhone}</p></td>
                                                            <td className="p-6"><div className="font-extrabold text-brand-dark text-sm">₦{(order.total || order.totalAmount || 0).toLocaleString()}</div><div className={`text-[10px] font-bold uppercase mt-1 ${(order.paymentStatus || order.status) === 'Paid' ? 'text-emerald-600' : 'text-amber-500'}`}>{order.paymentStatus || order.status || 'PENDING'}</div></td>
                                                            <td className="p-6"><span className={`text-[10px] font-extrabold uppercase tracking-wider px-3 py-1.5 rounded-lg ${stat.toLowerCase() === 'completed' ? 'bg-emerald-100 text-emerald-700' : stat.toLowerCase() === 'processing' ? 'bg-blue-100 text-blue-700' : stat.toLowerCase() === 'cancelled' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}`}>{stat}</span></td>
                                                            <td className="p-6 text-right"><button onClick={() => setSelectedOrder(order)} className="px-4 py-2 bg-white border border-slate-200 text-slate-700 font-bold text-xs rounded-xl shadow-sm hover:border-brand-blue hover:text-brand-blue transition-colors">Manage</button></td>
                                                        </tr>

                                            <h3 className="font-extrabold text-xl mb-2 relative z-10">Secure EmailJS Setup</h3>
                                            <p className="text-sm text-slate-300 mb-2 max-w-2xl relative z-10">Configure your custom EmailJS keys below. Data is securely encrypted (Base64) before being stored locally in your browser.</p>
                                            
                                            <div className="flex items-center gap-3 bg-slate-800/50 p-4 rounded-xl border border-brand-blue/20 mb-6 text-sm text-blue-100 max-w-3xl relative z-10">
                                                <HelpCircle className="text-brand-blue shrink-0" size={20}/>
                                                <p><strong>Want to send fully custom HTML emails without restrictions?</strong> Ensure your EmailJS Template contains <em>only</em> the variable <code>{'{{{message}}}'}</code> (Triple braces). This will permit EmailJS to parse any HTML format you create in the editor below.</p>

                                            <form onSubmit={saveEmailConfig} className="grid grid-cols-1 md:grid-cols-3 gap-4 relative z-10">

                                                <div>
                                                    <label className="block text-[10px] uppercase font-bold text-slate-400 tracking-wider mb-2">Template ID</label>
                                                    <input required type="text" value={emailJsConfig.templateId} onChange={e=>setEmailJsConfig({...emailJsConfig, templateId: e.target.value})} placeholder="e.g. template_..." className="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-sm focus:ring-2 focus:ring-brand-blue outline-none placeholder:text-slate-600"/>
                                                </div>
                                                <div className="md:col-span-3 flex justify-end gap-3 mt-4">
                                                    <button type="button" onClick={loadDemoKeys} className="bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center gap-2"><FileText size={16}/> Load Sample Format</button>
                                                    <button type="submit" className="bg-brand-blue hover:bg-brand-blueHover text-white font-bold py-3 px-6 rounded-xl shadow-md transition-colors flex items-center gap-2"><Lock size={16}/> Encrypt & Save</button>
                                                </div>
                                            </form>
                                        </div>

                                                        <div className="overflow-hidden"><p className="text-sm font-bold text-slate-800 truncate">{c.name}</p><p className="text-xs text-slate-500 truncate">{c.email}</p></div>

                                                    <button 
                                                        onClick={() => setCampaignMode('editor')} 
                                                        className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${campaignMode === 'editor' ? 'bg-white text-brand-dark shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                                    >
                                                        Rich Text Editor
                                                    </button>
                                                    <button 
                                                        onClick={() => setCampaignMode('template')} 
                                                        className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${campaignMode === 'template' ? 'bg-white text-brand-dark shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                                                    >
                                                        MBTECH Template
                                                    </button>
                                                </div>
                                            </div>

                                            <div className="space-y-5 flex-1 flex flex-col">
                                                <div>
                                                    <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Subject Line</label>
                                                    <input value={campaignSubject} onChange={e => setCampaignSubject(e.target.value)} className="w-full border border-slate-200 bg-slate-50 p-4 rounded-xl font-bold text-slate-900 focus:ring-2 focus:ring-brand-blue outline-none transition-shadow" placeholder="e.g. Special Offer from MBTECH NG!"/>
                                                </div>
                                                
                                                {campaignMode === 'editor' ? (
                                                    <div className="flex-1 flex flex-col">
                                                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Email Content (Rich Text)</label>
                                                        <RichTextEditor value={campaignBody} onChange={setCampaignBody} />
                                                    </div>
                                                ) : (
                                                    <div className="flex-1 flex flex-col">
                                                        <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Template Preview</label>
                                                        <div className="flex-1 border border-slate-200 rounded-xl overflow-hidden bg-slate-50 flex flex-col items-center justify-center p-6 text-center">
                                                            <div className="bg-white shadow-sm border border-slate-100 rounded-2xl p-6 w-full max-w-sm scale-95 opacity-80 pointer-events-none mb-4">
                                                                <div className="w-full h-12 bg-slate-900 rounded-lg mb-4 flex items-center justify-center"><span className="text-white font-extrabold text-sm">MBTECH NG</span></div>
                                                                <div className="h-4 bg-slate-200 rounded w-3/4 mb-3"></div>
                                                                <div className="h-3 bg-slate-100 rounded w-full mb-2"></div>
                                                                <div className="h-3 bg-slate-100 rounded w-5/6 mb-6"></div>
                                                                <div className="h-10 bg-brand-blue rounded w-full"></div>
                                                            </div>
                                                            <span className="font-extrabold text-brand-blue text-sm uppercase tracking-wider bg-blue-100 px-4 py-2 rounded-full border border-blue-200">
                                                                Using Standard MBTECH Template
                                                            </span>
                                                            <p className="text-xs text-slate-500 mt-3 max-w-xs">The system will dynamically inject the subject and customer name into the predefined HTML structure.</p>
                                                        </div>
                                                    </div>
                                                )}

                                            </div>
                                            <div className="mt-6 flex flex-col sm:flex-row items-start sm:items-center justify-between border-t border-slate-100 pt-6 gap-4">
                                                <div className="text-sm font-bold text-slate-500 flex items-center gap-2"><Users size={18} className="text-brand-blue"/> {selectedEmails.size} Recipients Selected</div>
                                                <button onClick={handleSendCampaign} disabled={sendingCampaign} className="w-full sm:w-auto px-8 py-4 bg-brand-dark text-white rounded-xl font-bold shadow-lg hover:bg-slate-800 transition-all flex items-center justify-center gap-2">{sendingCampaign ? <Loader2 className="animate-spin"/> : <Send size={18}/>} {sendingCampaign ? 'Sending...' : 'Broadcast Now'}</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                    
                    <OrderDetailsModal 
                        order={selectedOrder} 
                        currentUserEmail={currentUserEmail}
                        onClose={() => setSelectedOrder(null)} 
                        onUpdateStatus={updateOrderStatus} 
                        onUpdatePaymentStatus={updatePaymentStatus}
                        onDeleteOrder={handleDeleteOrder} 
                    />
                    
                    <CustomerProfileModal 
                        customer={selectedCustomer} 
                        orders={orders.filter(o => (o.email || o.customerEmail)?.toLowerCase() === selectedCustomer?.email?.toLowerCase())}
                        notes={allNotes.filter(n => n.email === selectedCustomer?.email?.toLowerCase())}
                        onClose={() => setSelectedCustomer(null)}
                        onAddNote={handleAddNote}
                    />

                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    <GlobalFooter />
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
