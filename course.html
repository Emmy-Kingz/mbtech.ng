                        <a href="store.html" className="flex flex-col items-center justify-center text-slate-400"><StoreIcon size={20}/><span className="text-[10px]">Store</span></a>

        // Auth Modal with honeypot bot trap
        function AuthModal({ isOpen, onClose, onSuccess }) {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [botHoney, setBotHoney] = useState('');

            if (!isOpen) return null;

            const handleSubmit = async (e) => {
                e.preventDefault();
                // Bot trap: if honeypot field is filled, silently reject
                if (botHoney !== '') {
                    console.log('Bot detected, rejecting');
                    return;
                }
                if (!validateEmail(email)) {
                    setError('Please enter a valid email address.');
                    return;
                }
                if (password.length < 6) {
                    setError('Password must be at least 6 characters.');
                    return;
                }
                setLoading(true);
                setError('');
                try {
                    if (isLogin) {
                        await signInWithEmailAndPassword(auth, email, password);
                    } else {
                        await createUserWithEmailAndPassword(auth, email, password);
                    }
                    onSuccess();
                    onClose();
                } catch (err) {
                    setError(err.message);
                }
                setLoading(false);
            };

            return (
                <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl max-w-md w-full p-6 relative">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold">{isLogin ? 'Sign In' : 'Create Account'}</h2>
                            <button onClick={onClose}><X size={24}/></button>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="email" placeholder="Email Address" value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-3 border rounded-xl" required />
                            <input type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 border rounded-xl" required />
                            {/* Honeypot field - hidden from humans */}
                            <input type="text" name="bot_honey" className="bot-trap" value={botHoney} onChange={e=>setBotHoney(e.target.value)} autoComplete="off" />
                            {error && <p className="text-red-500 text-sm">{error}</p>}
                            <button type="submit" disabled={loading} className="w-full bg-brand-blue text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                                {loading ? <Loader2 className="animate-spin"/> : (isLogin ? <LogIn size={18}/> : <UserPlus size={18/>)} {isLogin ? 'Sign In' : 'Sign Up'}
                            </button>
                        </form>
                        <p className="text-center text-sm mt-4">
                            {isLogin ? "Don't have an account? " : "Already have an account? "}
                            <button onClick={() => setIsLogin(!isLogin)} className="text-brand-blue font-bold">{isLogin ? 'Sign Up' : 'Sign In'}</button>

                    </div>
                </div>
            );
        }

        // Tutor Modal (unchanged, with basic validation)
        function TutorModal({ isOpen, onClose }) {
            const [loading, setLoading] = useState(false);
            const [guardianVisible, setGuardianVisible] = useState(false);
            const [selectedLevel, setSelectedLevel] = useState('SSS');
            const [botHoney, setBotHoney] = useState('');
            
            const subjectsList = {
                JSS: ['Math', 'English', 'Basic Sci', 'Basic Tech', 'ICT'],
                SSS: ['Math', 'English', 'Physics', 'Chemistry', 'Biology'],
                WAEC: ['Math', 'English', 'Physics', 'Chemistry', 'Biology', 'Economics'],
                JAMB: ['Use of English', 'Math', 'Physics', 'Chemistry', 'Biology'],
                IGCSE: ['Math', 'English', 'Physics', 'Chemistry', 'ICT']
            };

            if (!isOpen) return null;

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (botHoney !== '') return;
                const form = e.target;
                const studentName = form.studentName.value.trim();
                const studentPhone = form.studentPhone.value.trim();
                if (!validateName(studentName)) { alert('Please enter a valid name.'); return; }
                if (!validatePhone(studentPhone)) { alert('Please enter a valid phone number.'); return; }
                
                setLoading(true);
                const formData = new FormData(form);
                const studentAge = parseInt(formData.get('studentAge'));
                const subjects = Array.from(form.querySelectorAll('input[name="subjects"]:checked')).map(cb => cb.value).join(', ');
                
                const payload = {
                    type: 'tutor_request',
                    studentName: formData.get('studentName'),
                    studentAge: studentAge,
                    parentName: studentAge < 16 ? formData.get('parentName') : '',
                    parentPhone: studentAge < 16 ? formData.get('parentPhone') : '',
                    level: formData.get('level'),
                    curriculum: formData.get('curriculum'),
                    subjects: subjects,
                    platform: formData.get('platform'),
                    email: formData.get('studentEmail') || '',
                    phone: formData.get('studentPhone'),
                    timestamp: serverTimestamp(),
                    status: 'New'
                };
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'mbtech_connect_leads'), payload);
                } catch (err) { console.error(err); }
                
                const msg = `Hello Tutor! New booking request.%0AStudent: ${payload.studentName} (Age ${studentAge})%0ALevel: ${payload.level}%0ASubjects: ${subjects}%0APlatform: ${payload.platform}%0APhone: ${payload.phone}`;
                window.open(`https://wa.me/${TUTOR_WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
                setLoading(false);
                onClose();
            };

            const updateGuardian = (e) => { setGuardianVisible(parseInt(e.target.value) < 16); };

            return (
                <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm overflow-y-auto">
                    <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto relative">
                        <div className="sticky top-0 bg-white p-4 border-b flex justify-between items-center"><h2 className="text-2xl font-bold">Get a Private Tutor</h2><button onClick={onClose}><X size={24}/></button></div>
                        <form onSubmit={handleSubmit} className="p-6 space-y-5">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input name="studentName" required placeholder="Student's Full Name" className="p-3 border rounded-xl bg-slate-50" />
                                <input name="studentAge" type="number" required placeholder="Age" onChange={updateGuardian} className="p-3 border rounded-xl bg-slate-50" />
                                {guardianVisible && <><input name="parentName" placeholder="Parent/Guardian Name" className="p-3 border rounded-xl bg-slate-50" /><input name="parentPhone" placeholder="Parent Phone" className="p-3 border rounded-xl bg-slate-50" /></>}
                                <input name="studentEmail" type="email" placeholder="Email (optional)" className="p-3 border rounded-xl bg-slate-50" />
                                <input name="studentPhone" required placeholder="WhatsApp Number" className="p-3 border rounded-xl bg-slate-50" />
                                <select name="level" className="p-3 border rounded-xl bg-slate-50" onChange={(e) => setSelectedLevel(e.target.value)}>
                                    <option value="JSS">JSS 1-3</option><option value="SSS">SSS 1-3</option><option value="WAEC">WAEC/NECO</option><option value="JAMB">JAMB UTME</option><option value="IGCSE">IGCSE</option>
                                </select>
                                <select name="curriculum" className="p-3 border rounded-xl bg-slate-50"><option>West African</option><option>British</option><option>American</option></select>
                            </div>
                            <div><label className="font-bold text-sm">Select Subjects</label><div className="grid grid-cols-3 gap-2 mt-2">{(subjectsList[selectedLevel] || subjectsList['SSS']).map(sub => <label key={sub} className="flex items-center gap-2 text-sm"><input type="checkbox" name="subjects" value={sub} className="w-4 h-4" />{sub}</label>)}</div></div>
                            <div><label className="font-bold text-sm">Preferred Platform</label><div className="flex gap-4 mt-2"><label><input type="radio" name="platform" value="whatsapp" defaultChecked /> WhatsApp</label><label><input type="radio" name="platform" value="telegram" /> Telegram</label><label><input type="radio" name="platform" value="gmeet" /> Google Meet</label></div></div>
                            <input type="text" name="bot_honey" className="bot-trap" value={botHoney} onChange={e=>setBotHoney(e.target.value)} autoComplete="off" />
                            <button type="submit" disabled={loading} className="w-full bg-brand-orange text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">{loading ? <Loader2 className="animate-spin"/> : "Submit & Chat on WhatsApp"}</button>
                        </form>
                    </div>
                </div>
            );
        }

        // Enrollment Modal with validation and honeypot
        function CourseEnrollModal({ selectedCourses, total, isOpen, onClose, userName, userEmail, userPhone, setUserName, setUserEmail, setUserPhone }) {
            const [loading, setLoading] = useState(false);
            const [botHoney, setBotHoney] = useState('');
            if (!isOpen || selectedCourses.length === 0) return null;

            const handlePaystackPayment = () => {
                if (botHoney !== '') return;
                if (!validateName(userName)) { alert("Please enter your full name."); return; }
                if (!validateEmail(userEmail)) { alert("Please enter a valid email address."); return; }
                if (!validatePhone(userPhone)) { alert("Please enter a valid phone number."); return; }
                setLoading(true);
                const coursesList = selectedCourses.map(c => c.title).join(', ');
                const amountInKobo = total * 100;
                
                const handler = PaystackPop.setup({
                    key: getPaystackKey(),
                    email: userEmail,
                    amount: amountInKobo,
                    currency: 'NGN',
                    metadata: {
                        custom_fields: [
                            { display_name: "Full Name", variable_name: "full_name", value: userName },
                            { display_name: "Courses", variable_name: "courses", value: coursesList },
                            { display_name: "Phone", variable_name: "phone", value: userPhone }
                        ]
                    },
                    callback: async (response) => {
                        try {
                            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'mbtech_connect_leads'), {
                                type: 'course_enrollment',
                                name: userName, email: userEmail, phone: userPhone,
                                courses: coursesList,
                                totalAmount: total,
                                transactionRef: response.reference,
                                status: 'Paid',
                                timestamp: serverTimestamp()
                            });
                        } catch(e) { console.error(e); }
                        const msg = `✅ Payment successful! I have enrolled for: ${coursesList}. Total: ₦${total.toLocaleString()}. Name: ${userName}. Please send registration details.`;
                        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
                        setLoading(false);
                        onClose();
                    },
                    onClose: () => {
                        setLoading(false);
                        alert("Payment window closed.");
                    }
                });
                handler.openIframe();
            };

            return (
                <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl max-w-md w-full p-6 relative">
                        <div className="flex justify-between"><h3 className="text-xl font-bold">Complete Enrollment</h3><button onClick={onClose}><X/></button></div>
                        <p className="text-sm text-slate-500 mt-1">Selected {selectedCourses.length} course(s): <span className="font-bold">₦{total.toLocaleString()}</span></p>
                        <div className="space-y-4 mt-4">
                            <input type="text" placeholder="Full Name" value={userName} onChange={e=>setUserName(e.target.value)} className="w-full p-3 border rounded-xl" required />
                            <input type="email" placeholder="Email Address" value={userEmail} onChange={e=>setUserEmail(e.target.value)} className="w-full p-3 border rounded-xl" required />
                            <input type="tel" placeholder="Phone Number" value={userPhone} onChange={e=>setUserPhone(e.target.value)} className="w-full p-3 border rounded-xl" required />
                            <input type="text" name="bot_honey" className="bot-trap" value={botHoney} onChange={e=>setBotHoney(e.target.value)} autoComplete="off" />
                            <button onClick={handlePaystackPayment} disabled={loading} className="w-full bg-brand-blue text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                                {loading ? <Loader2 className="animate-spin"/> : <><CreditCard size={18}/> Pay ₦{total.toLocaleString()} via Paystack</>}
                            </button>
                            <p className="text-[10px] text-center text-slate-400">Secure payment powered by Paystack</p>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App
        function App() {
            const [courses, setCourses] = useState([]);
            const [user, setUser] = useState(null);
            const [selectedCourses, setSelectedCourses] = useState([]);
            const [tutorModalOpen, setTutorModalOpen] = useState(false);
            const [enrollModalOpen, setEnrollModalOpen] = useState(false);
            const [authModalOpen, setAuthModalOpen] = useState(false);
            const [pendingEnroll, setPendingEnroll] = useState(false);
            const [userName, setUserName] = useState('');
            const [userEmail, setUserEmail] = useState('');
            const [userPhone, setUserPhone] = useState('');

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser && pendingEnroll) {
                        setPendingEnroll(false);
                        setEnrollModalOpen(true);
                    }
                });
                return () => unsubscribe();
            }, [pendingEnroll]);

            useEffect(() => {
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'mbtech_courses');
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    if (!snapshot.empty) {
                        const list = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setCourses(list);
                    } else {
                        setCourses(FALLBACK_COURSES);
                        FALLBACK_COURSES.forEach(async (c) => {
                            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'mbtech_courses', c.id);
                            await setDoc(ref, { ...c, published: true, createdAt: serverTimestamp() }).catch(()=>{});
                        });
                    }
                }, () => setCourses(FALLBACK_COURSES));
                return () => unsubscribe();
            }, []);

            const toggleCourse = (course) => {
                setSelectedCourses(prev => prev.find(c => c.id === course.id) ? prev.filter(c => c.id !== course.id) : [...prev, course]);
            };

            const totalPrice = selectedCourses.reduce((sum, c) => sum + (c.price || 0), 0);
            const categories = ['Design', 'Tech', 'Engineering'];
            const grouped = categories.map(cat => ({ name: cat, items: courses.filter(c => c.category === cat) }));

            const handleEnrollClick = () => {
                if (selectedCourses.length === 0) return;
                if (user) {
                    setEnrollModalOpen(true);
                } else {
                    setPendingEnroll(true);
                    setAuthModalOpen(true);
                }
            };

            const handleAuthSuccess = () => {
                // After login, enrollment modal will open via useEffect
            };

            const handleAuthCancel = () => {
                // Fallback: send user details via WhatsApp with selected courses
                const coursesList = selectedCourses.map(c => c.title).join(', ');
                const msg = `Hello Mbtech, I am interested in these courses: ${coursesList}. Total: ₦${totalPrice.toLocaleString()}. Please contact me to complete enrollment.`;
                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
                setPendingEnroll(false);
            };

            const handleLogout = () => {
                signOut(auth);
                setSelectedCourses([]);
                setUserName('');
                setUserEmail('');
                setUserPhone('');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Navbar user={user} onLogout={handleLogout} onOpenTutorModal={() => setTutorModalOpen(true)} />
                    
                    <div className="relative bg-brand-dark text-white pt-24 pb-16">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <h1 className="text-4xl md:text-6xl font-extrabold">Build Your Future<span className="text-brand-orange">.</span></h1>
                            <p className="text-slate-300 mt-4 max-w-2xl mx-auto">Select multiple courses from Design, Tech, or Engineering. Pay once and start learning.</p>
                            {selectedCourses.length > 0 && (
                                <div className="mt-6 inline-flex items-center gap-4 bg-white/10 backdrop-blur rounded-full px-6 py-3">
                                    <span className="font-bold">₦{totalPrice.toLocaleString()}</span>
                                    <button onClick={handleEnrollClick} className="bg-brand-orange px-6 py-2 rounded-full text-sm font-bold">Enroll Selected ({selectedCourses.length})</button>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-12">
                        {grouped.map(group => group.items.length > 0 && (
                            <div key={group.name} className="mb-12">
                                <h2 className="text-2xl font-extrabold mb-6 flex items-center gap-2"><span className={`w-2 h-6 rounded-full ${group.name === 'Design' ? 'bg-pink-500' : group.name === 'Tech' ? 'bg-brand-blue' : 'bg-brand-orange'}`}></span>{group.name} Courses</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {group.items.map(course => (
                                        <div key={course.id} className="bg-white rounded-2xl border border-slate-200 p-5 hover:shadow-lg transition-all relative">
                                            <div className="flex items-start justify-between">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-brand-blue">{getIcon(course.iconName)}</div>
                                                    <div><h3 className="font-bold text-lg">{course.title}</h3><p className="text-xs text-slate-500">{course.duration}</p></div>
                                                </div>
                                                <input type="checkbox" checked={!!selectedCourses.find(c => c.id === course.id)} onChange={() => toggleCourse(course)} className="w-5 h-5 accent-brand-blue" />
                                            </div>
                                            <p className="text-sm text-slate-600 mt-3 line-clamp-2">{course.description}</p>
                                            <div className="mt-4 flex justify-between items-center">
                                                <span className="font-extrabold text-brand-dark">₦{(course.price || 0).toLocaleString()}</span>
                                                <button onClick={() => toggleCourse(course)} className="text-xs font-bold text-brand-blue underline">Select</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    <CourseEnrollModal 
                        selectedCourses={selectedCourses} 
                        total={totalPrice} 
                        isOpen={enrollModalOpen} 
                        onClose={() => setEnrollModalOpen(false)}
                        userName={userName}
                        userEmail={userEmail}
                        userPhone={userPhone}
                        setUserName={setUserName}
                        setUserEmail={setUserEmail}
                        setUserPhone={setUserPhone}
                    />
                    <TutorModal isOpen={tutorModalOpen} onClose={() => setTutorModalOpen(false)} />
                    <AuthModal 
                        isOpen={authModalOpen} 
                        onClose={() => { setAuthModalOpen(false); handleAuthCancel(); }} 
                        onSuccess={handleAuthSuccess} 
                    />

                    <footer className="bg-brand-dark text-slate-400 pt-16 pb-12 mt-16">
                        <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
                            <div><img src="logo.png" className="h-10 mb-3" onError={(e)=>{e.target.style.display='none'}}/><p className="text-sm">MBTECH NG — Innovating Africa through tech & engineering.</p></div>
                            <div><h4 className="text-white font-bold mb-4">Quick Links</h4><ul className="space-y-2"><li><a href="index.html">Home</a></li><li><a href="course.html">Courses</a></li><li><a href="store.html">Store</a></li></ul></div>
                            <div><h4 className="text-white font-bold mb-4">Legal</h4><ul className="space-y-2"><li><button onClick={()=>alert("Privacy Policy: We protect your data.")}>Privacy</button></li><li><button onClick={()=>alert("Terms: Use of platform.")}>Terms</button></li></ul></div>
                            <div><h4 className="text-white font-bold mb-4">Contact</h4><p><Phone size={16} className="inline mr-2"/> +234 708 467 2771</p><p><Mail size={16} className="inline mr-2"/> info@mbtech.ng</p></div>
                        </div>
                        <div className="text-center text-xs pt-8 border-t border-slate-800 mt-8">&copy; 2026 Mesobest Technology. All rights reserved.</div>
                    </footer>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
